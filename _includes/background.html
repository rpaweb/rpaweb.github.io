<div id="container" oncontextmenu="return false;">
  <!-- This DIV makes the background effect -->
  <div><!-- This DIV shows the background overlay --></div>
</div>

<script>
  var bgImages = [{% assign bg_images = site.static_files | where_exp: "file", "file.path contains '/assets/images/backgrounds/'" %}{% for img in bg_images %}"{{ img.path }}"{% unless forloop.last %},{% endunless %}{% endfor %}];

  var currentIndex = 0;
  var container = document.getElementById("container");

  function setBackground(index) {
    container.style.backgroundImage = "url('" + bgImages[index] + "')";
  }

  function fadeAndChange() {
    container.style.opacity = "0";
    setTimeout(function () {
      currentIndex = (currentIndex + 1) % bgImages.length;
      setBackground(currentIndex);
      container.style.opacity = "1";
    }, 800);
  }

  if (bgImages.length > 0) {
    setBackground(0);
    if (bgImages.length > 1) {
      setInterval(fadeAndChange, 30000);
    }
  }
</script>
